<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recargas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    background:#f5f8fc;
    font-family:'Segoe UI',sans-serif;
}

/* NAVBAR */
.navbar{
    background:linear-gradient(90deg,#009FDB,#6F42C1,#E83E8C);
}
.navbar-brand{
    color:white !important;
    font-weight:bold;
}
.nav-link{
    color:white !important;
    font-weight:500;
}
.usuario{
    color:white;
    font-weight:bold;
}

/* CONTENIDO */
.contenedor{
    padding:30px;
}
.card{
    border:none;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}
.btn-recarga{
    background:linear-gradient(90deg,#009FDB,#6F42C1,#E83E8C);
    color:white;
    border:none;
}
.btn-eliminar{
    background:#E83E8C;
    color:white;
}
.avatar{
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:bold;
}
.stat{
    text-align:center;
    padding:20px;
}
.stat h3{
    color:#009FDB;
    font-weight:bold;
}
thead{
    background:#f1f4f8;
}
</style>
</head>

<body>

<!-- Barra de navegación con apartado Menú -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <span class="navbar-brand">Central de Telefonía Móvil</span>

    <!-- Botón responsive -->
    <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Apartados -->
    <div class="collapse navbar-collapse" id="menuNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link text-white" href="Menu.html"><i class="fa-solid fa-house"></i> Menú</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="clientes.html">Clientes</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="mensajeria.html">Mensajería</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="llamadas.html">Llamadas</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="recargas.html">Recargas</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="Facturas.html">Facturación</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="reportes.html">Reportes</a></li>
      </ul>

      <!-- Usuario y botón salir -->
      <div>
        <span class="usuario me-3">
          <i class="fa-solid fa-user"></i> Administrador
        </span>
      
          
</nav>

<div class="container contenedor">
  <div class="row mb-4">
    <div class="col-md-6">
      <div class="card stat">
        <h3 id="totalRecargas">0</h3>
        <p>Total de Recargas</p>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card stat">
        <h3 id="totalMonto">$0</h3>
        <p>Monto Recaudado</p>
      </div>
    </div>
  </div>

  <div class="card p-4 mb-4">
    <h3><i class="fa-solid fa-mobile-screen"></i> Registrar Recarga</h3>
    <hr>
    <div class="row">
      <div class="col-md-3 mb-3"><input type="text" id="cliente" class="form-control" placeholder="Cliente"></div>
      <div class="col-md-3 mb-3"><input type="text" id="numero" class="form-control" placeholder="Número"></div>
      <div class="col-md-3 mb-3"><input type="number" id="monto" class="form-control" placeholder="Monto"></div>
      <div class="col-md-3 mb-3">
        <select id="operador" class="form-select">
          <option>AT&T</option>
          <option>Telcel</option>
          <option>Movistar</option>
          <option>Unefon</option>
        </select>
      </div>
      <div class="col-md-12">
        <button class="btn btn-recarga w-100" onclick="registrarRecarga()">
          <i class="fa-solid fa-money-bill-wave"></i> Registrar Recarga
        </button>
      </div>
    </div>
  </div>

  <div class="card p-4">
    <h3><i class="fa-solid fa-clock-rotate-left"></i> Historial de Recargas</h3>
    <table class="table table-hover" id="tablaRecargas">
      <thead>
        <tr>
          <th>Avatar</th>
          <th>ID</th>
          <th>Cliente</th>
          <th>Número</th>
          <th>Monto</th>
          <th>Operador</th>
          <th>Fecha</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
let id = 1;
let totalRecargas = 0;
let totalMonto = 0;

const colores = ["#E83E8C","#009FDB","#6F42C1","#28A745","#FF9800","#20C997"];

function registrarRecarga(){
  let cliente = document.getElementById("cliente").value;
  let numero = document.getElementById("numero").value;
  let monto = document.getElementById("monto").value;
  let operador = document.getElementById("operador").value;

  if(cliente=="" || numero=="" || monto==""){
    alert("Complete todos los campos");
    return;
  }

  let color = colores[(id-1)%colores.length];
  let inicial = cliente.charAt(0).toUpperCase();
  let fecha = new Date().toLocaleDateString();

  let tabla = document.getElementById("tablaRecargas").getElementsByTagName("tbody")[0];
  let fila = tabla.insertRow();

  fila.insertCell(0).innerHTML = `<div class="avatar" style="background:${color}">${inicial}</div>`;
  fila.insertCell(1).innerHTML = id;
  fila.insertCell(2).innerHTML = cliente;
  fila.insertCell(3).innerHTML = numero;
  fila.insertCell(4).innerHTML = "$"+monto;
  fila.insertCell(5).innerHTML = operador;
  fila.insertCell(6).innerHTML = fecha;
  fila.insertCell(7).innerHTML =
    `<button class="btn btn-eliminar btn-sm" onclick="eliminarRecarga(this,${monto})">
      <i class="fa-solid fa-trash"></i>
    </button>`;

  totalRecargas++;
  totalMonto += Number(monto);
  actualizarEstadisticas();
  id++;

  document.getElementById("cliente").value="";
  document.getElementById("numero").value="";
  document.getElementById("monto").value="";
}

function eliminarRecarga(btn,monto){
  if(confirm("¿Eliminar recarga?")){
    btn.parentNode.parentNode.remove();
    totalRecargas--;
    totalMonto -= Number(monto);
    actualizarEstadisticas();
  }
}

function actualizarEstadisticas(){
  document.getElementById("totalRecargas").innerHTML = totalRecargas;
  document.getElementById("totalMonto").innerHTML = "$" + totalMonto;
}

function cerrarSesion(){
  if(confirm("¿Desea cerrar sesión?")){
    window.location.href = "TELEFONIA inicio 1.html";
  }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
