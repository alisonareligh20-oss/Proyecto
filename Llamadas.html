<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestión de Llamadas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    background:#f5f8fc;
    font-family:'Segoe UI',sans-serif;
}

/* NAVBAR */
.navbar{
    background:linear-gradient(90deg,#009FDB,#6F42C1,#E83E8C);
}
.navbar-brand{
    color:white !important;
    font-weight:bold;
}
.nav-link{
    color:white !important;
    font-weight:500;
}
.usuario{
    color:white;
    font-weight:bold;
}

/* CONTENIDO */
.contenedor{
    padding:30px;
}
.card{
    border:none;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}
.btn-registrar{
    background:linear-gradient(90deg,#009FDB,#6F42C1,#E83E8C);
    color:white;
    border:none;
}
.btn-eliminar{
    background:#E83E8C;
    color:white;
}
.avatar{
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
}
.stat{
    text-align:center;
    padding:20px;
}
.stat h3{
    color:#009FDB;
    font-weight:bold;
}
.badge-entrante{
    background:#28A745;
}
.badge-saliente{
    background:#009FDB;
}
thead{
    background:#f1f4f8;
}
</style>
</head>

<body>

<!-- Barra de navegación con apartado Menú -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <span class="navbar-brand">Central de Telefonía Móvil</span>

    <!-- Botón responsive -->
    <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Apartados -->
    <div class="collapse navbar-collapse" id="menuNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link text-white" href="Menu.html"><i class="fa-solid fa-house"></i> Menú</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="clientes.html">Clientes</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="mensajeria.html">Mensajería</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="llamadas.html">Llamadas</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="recargas.html">Recargas</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="Facturas.html">Facturación</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="reportes.html">Reportes</a></li>
      </ul>

      <!-- Usuario y botón salir -->
      <div>
        <span class="usuario me-3">
          <i class="fa-solid fa-user"></i> Administrador
        </span>
        
</nav>

<div class="container contenedor">
  <div class="row mb-4">
    <div class="col-md-4">
      <div class="card stat">
        <h3 id="totalLlamadas">0</h3>
        <p>Total de llamadas</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card stat">
        <h3 id="entrantes">0</h3>
        <p>Entrantes</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card stat">
        <h3 id="salientes">0</h3>
        <p>Salientes</p>
      </div>
    </div>
  </div>

  <div class="card p-4 mb-4">
    <h3><i class="fa-solid fa-phone"></i> Registro de Llamadas</h3>
    <hr>
    <div class="row">
      <div class="col-md-4 mb-3"><input type="text" id="cliente" class="form-control" placeholder="Nombre del cliente"></div>
      <div class="col-md-4 mb-3"><input type="text" id="numero" class="form-control" placeholder="Número telefónico"></div>
      <div class="col-md-4 mb-3"><input type="number" id="duracion" class="form-control" placeholder="Duración (minutos)"></div>
      <div class="col-md-6 mb-3">
        <select id="tipo" class="form-select">
          <option>Entrante</option>
          <option>Saliente</option>
        </select>
      </div>
      <div class="col-md-6 mb-3">
        <button class="btn btn-registrar w-100" onclick="registrarLlamada()">
          <i class="fa-solid fa-phone-volume"></i> Registrar Llamada
        </button>
      </div>
    </div>
  </div>

  <div class="card p-4">
    <h3><i class="fa-solid fa-list"></i> Historial de Llamadas</h3>
    <table class="table table-hover" id="tablaLlamadas">
      <thead>
        <tr>
          <th>Avatar</th>
          <th>ID</th>
          <th>Cliente</th>
          <th>Número</th>
          <th>Duración</th>
          <th>Tipo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
let id = 1;
let total = 0;
let entrantes = 0;
let salientes = 0;

const colores = ["#E83E8C","#009FDB","#6F42C1","#28A745","#FF9800","#20C997"];

function registrarLlamada(){
  let cliente = document.getElementById("cliente").value;
  let numero = document.getElementById("numero").value;
  let duracion = document.getElementById("duracion").value;
  let tipo = document.getElementById("tipo").value;

  if(cliente=="" || numero=="" || duracion==""){
    alert("Complete todos los campos");
    return;
  }

  let color = colores[(id-1)%colores.length];
  let inicial = cliente.charAt(0).toUpperCase();
  let badge = tipo=="Entrante"
    ? '<span class="badge badge-entrante">Entrante</span>'
    : '<span class="badge badge-saliente">Saliente</span>';

  let tabla = document.getElementById("tablaLlamadas").getElementsByTagName("tbody")[0];
  let fila = tabla.insertRow();

  fila.insertCell(0).innerHTML = `<div class="avatar" style="background:${color}">${inicial}</div>`;
  fila.insertCell(1).innerHTML = id;
  fila.insertCell(2).innerHTML = cliente;
  fila.insertCell(3).innerHTML = numero;
  fila.insertCell(4).innerHTML = duracion+" min";
  fila.insertCell(5).innerHTML = badge;
  fila.insertCell(6).innerHTML =
    `<button class="btn btn-eliminar btn-sm" onclick="eliminarFila(this)">
      <i class="fa-solid fa-trash"></i>
    </button>`;

  total++;
  if(tipo=="Entrante"){ entrantes++; } else { salientes++; }
  actualizarEstadisticas();
  id++;

  document.getElementById("cliente").value="";
  document.getElementById("numero").value="";
  document.getElementById("duracion").value="";
}

function eliminarFila(btn){
  if(confirm("¿Desea eliminar esta llamada?")){
    btn.parentNode.parentNode.remove();
  }
}

function actualizarEstadisticas(){
  document.getElementById("totalLlamadas").innerHTML = total;
  document.getElementById("entrantes").innerHTML = entrantes;
  document.getElementById("salientes").innerHTML = salientes;
}
